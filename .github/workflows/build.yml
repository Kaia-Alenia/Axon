name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  server:
    name: Build Go Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Build Server Binaries
        run: |
          mkdir -p build/
          cd server
          GOOS=linux GOARCH=amd64 go build -v -ldflags="-s -w" -o ../build/axon-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -v -ldflags="-s -w" -o ../build/axon-windows-amd64.exe .
          GOOS=darwin GOARCH=amd64 go build -v -ldflags="-s -w" -o ../build/axon-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -v -ldflags="-s -w" -o ../build/axon-darwin-arm64 .

      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axon-server-binaries
          path: build/

  android:
    name: Build Android Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: actions/setup-gradle@v4

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy and rename APK
        run: |
          mkdir -p build/
          cp android/app/build/outputs/apk/debug/app-debug.apk build/axon-android-debug.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axon-android-apk
          path: build/axon-android-debug.apk

  release:
    name: Create GitHub Release
    needs: [server, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Server Artifacts
        uses: actions/download-artifact@v4
        with:
          name: axon-server-binaries
          path: release-assets

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: axon-android-apk
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/axon-linux-amd64
            release-assets/axon-windows-amd64.exe
            release-assets/axon-darwin-amd64
            release-assets/axon-darwin-arm64
            release-assets/axon-android-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
